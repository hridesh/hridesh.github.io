---
layout: default
---
<header class="page-head">
  <div class="container">
    <div class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</div>
    <h1>{{ page.title }}</h1>
  </div>
</header>

<div class="container">
  <article class="post">
    <div class="entry">
      {{ content }}
    </div>

    <p style="margin-top:2.4rem">
      <a href="{{ site.baseurl }}/news/">&#8592; Back to all news</a>
    </p>

    {% include disqus.html %}
  </article>
</div>
